<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EHDS Demo · FHIR Server Viewer</title>
    <link rel="stylesheet" href="/ui/styles.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🩺</text></svg>" />
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <span class="dot"></span>
            <div>
                <div class="title">EHDS Demo</div>
                <div class="subtitle">EU Health Data API · FHIR R4 · synthetic data</div>
            </div>
        </div>
        <nav>
            <a href="#/" data-nav>Home</a>
            <span class="nav-group-label">Explore</span>
            <a href="#/patients" data-nav>Patients</a>
            <a href="#/documents" data-nav>Documents</a>
            <a href="#/resources" data-nav>Resources</a>
            <a href="#/qr" data-nav>QR</a>
            <span class="nav-group-label">Build</span>
            <a href="#/client" data-nav>Client</a>
            <a href="#/implement" data-nav>Implement</a>
            <a href="#/register" data-nav>Register</a>
            <a href="#/authorization" data-nav>Auth</a>
            <a href="#/endpoints" data-nav>Endpoints</a>
            <a href="#/server" data-nav>Server</a>
        </nav>
    </header>
    <main id="app">
        <div class="loading">loading…</div>
    </main>
    <footer>
        <span>EHDS Demo · open-source · Apache-2.0</span>
        <span class="footer-tags" id="footer-tags"></span>
    </footer>

    <!-- JSON viewer modal -->
    <div id="json-modal" class="modal-overlay" hidden>
        <div class="modal">
            <div class="modal-head">
                <div class="modal-title">
                    <span id="modal-title-text">FHIR resource</span>
                    <span class="muted" id="modal-url"></span>
                </div>
                <div class="modal-actions">
                    <button class="btn-ghost" id="modal-copy">Copy JSON</button>
                    <button class="btn-ghost" id="modal-close" aria-label="close">✕</button>
                </div>
            </div>
            <pre class="json-dump" id="modal-body"></pre>
        </div>
    </div>

    <!-- toast -->
    <div id="toast" class="toast" hidden></div>

    <script src="/ui/main.js"></script>
</body>
</html>

name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: lint
        run: ruff check app tests scripts

      - name: tests (no validator jar — fast layers only)
        run: pytest -q

      - name: cache validator jar
        run: ./fetch_validator.sh

      - name: tests (with java validator — heavy profile checks)
        run: pytest tests/test_profile_validation.py -q
